<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng ký E-Commerce</title>
</head>

<body>
    <form action="#" method="post">
        <!-- ================= FIELDSET 1 ================= -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <div>
                <label for="fullname">Họ tên: </label>
                <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên" required minlength="2"
                    maxlength="50">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập email" required>
            </div>
            <div>
                <label for="dob">Ngày sinh</label>
                <input type="date" id="dob" placeholder="Chọn ngày sinh" required>
            </div>
            <div>
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại(10 chữ số)" pattern="[0-9]{10} "
                    required>
            </div>
        </fieldset>
        <!-- ================= FIELDSET 2 ================= -->
        <fieldset>
            <legend>Tài khoản</legend>
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="3-20 ký tự, chữ/số/_"
                    pattern="[A-Za-z0-9_]{3,20}" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Ít nhất 8 ký tự, có chữ hoa và số"
                    pattern="(?=.*[A-Z])(?=.*\\d).{8,}" required>
            </div>
            <div>
                <label for="confirm_password">Xác nhận password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu"
                    required>
            </div>
        </fieldset>

        <!-- ================= FIELDSET 3 ================= -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <div>
                <label for="city">Thành phố</label>
                <select id="city" name="city" required>
                    <option value="">-- Chọn thành phố --</option>
                    <option>Hà Nội</option>
                    <option>TP. Hồ Chí Minh</option>
                    <option>Đà Nẵng</option>
                    <option>Hải Phòng</option>
                    <option>Cần Thơ</option>
                </select>
            </div>
            <div>
                <label for="district">Quận/Huyện</label>
                <select id="district" name="district" required>
                    <option value="">-- Chọn quận/huyện --</option>
                    <option>Quận 1</option>
                    <option>Quận 3</option>
                    <option>Ba Đình</option>
                    <option>Cầu Giấy</option>
                </select>
            </div>
            <div>
                <label for="address">Địa chỉ chi tiết</label>
                <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ chi tiết" required></textarea>
            </div>
            <div>
                <p>Giới tính</p>
                <label>
                    <input type="radio" name="gender" value="male" required>
                    Nam
                </label>
                <label>
                    <input type="radio" name="gender" value="female">
                    Nữ
                </label>
                <label>
                    <input type="radio" name="gender" value="other">
                    Khác
                </label>
            </div>
            <div>
                <label>
                    <input type="checkbox" name="terms" required>
                    Tôi đồng ý với điều khoản sử dụng
                </label>
            </div>
        </fieldset>
        <!-- ================= BUTTONS ================= -->
        <button type="submit">Đăng ký</button>
        <button type="reset">Reset</button>
    </form>
</body>

</html>
